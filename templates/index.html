<!DOCTYPE html>
<html>
<head>
    <title>Plant AI Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
        }

        .card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        input[type="file"] {
            width: 100%;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00c853;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00e676;
        }

        img {
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            display: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #00e676;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .result {
            margin-top: 15px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .bar {
            height: 10px;
            background: #444;
            border-radius: 5px;
            margin-top: 5px;
        }

        .fill {
            height: 10px;
            border-radius: 5px;
        }

        .error {
            color: #ff5252;
            margin-top: 10px;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>🌿 Plant AI Detector</h1>

        <form id="form" action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" id="fileInput" name="file" accept="image/*" capture="camera">
            <button type="submit">Analyze</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>

        <img id="preview">

        {% if result %}
        <div class="result">
            <p><b>Disease:</b> {{ result }}</p>

            <p><b>Confidence:</b> {{ confidence }}%</p>
            <div class="bar">
                <div class="fill"
                style="width: {{ confidence }}%;
                background: {{ 'green' if confidence|float > 80 else 'orange' if confidence|float > 50 else 'red' }}">
                </div>
            </div>

            <p><b>Description:</b> {{ description }}</p>
            <p><b>Remedy:</b> {{ remedy }}</p>

            <form action="/" method="get">
                <button style="margin-top:10px;">🔄 New Scan</button>
            </form>
        </div>
        {% endif %}

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <div class="footer">
            Built with ❤️ using Machine Learning
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const form = document.getElementById('form');
    const loader = document.getElementById('loader');

    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    };

    form.onsubmit = () => {
        loader.style.display = "block";
    };
</script>

</body>
</html>
