<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant AI Detector | Professional Botanical Suite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --primary-green: #2d7a3a;
            --light-green: #69f0ae;
            --deep-forest: #071510;
            --accent-green: #81c784;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(129, 199, 132, 0.15);
        }

        .app {
            min-height: 100vh;
            background: linear-gradient(140deg, #071510 0%, #0c2016 50%, #071510 100%);
            font-family: 'DM Sans', sans-serif;
            color: #e8f5e0;
            overflow-x: hidden;
            position: relative;
        }

        .bg-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; opacity: .12; animation: floatP 10s ease-in-out infinite alternate; }
        .p1 { width: 500px; height: 500px; background: var(--primary-green); top: -120px; left: -120px; }
        .p2 { width: 350px; height: 350px; background: #4caf50; top: 40%; right: -80px; animation-delay: -4s; }
        .p3 { width: 280px; height: 280px; background: #1b5e20; bottom: -60px; left: 25%; animation-delay: -7s; }
        @keyframes floatP { from { transform: translate(0,0) scale(1); } to { transform: translate(25px,18px) scale(1.05); } }

        .wrap { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 2rem 1rem 5rem; }

        .header { text-align: center; margin-bottom: 2rem; }
        .logo-box { width: 60px; height: 60px; background: linear-gradient(135deg, #3a9e4a, #5ccc6c); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 15px; animation: glow 3s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 6px 24px rgba(76,175,80,.3); } 50% { box-shadow: 0 6px 40px rgba(76,175,80,.6); } }
        .title { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #a5d6a7, #e8f5e9, #69f0ae); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
        .stat-box { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-num { font-size: 1.2rem; font-weight: 600; color: var(--light-green); display: block; }
        .stat-lbl { font-size: 0.65rem; color: #66bb6a; text-transform: uppercase; letter-spacing: 1px; }

        .tabs { display: flex; gap: 4px; background: rgba(255,255,255,.05); border-radius: 14px; padding: 4px; margin-bottom: 1.5rem; }
        .tab { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; color: var(--accent-green); background: transparent; font-weight: 600; transition: 0.3s; }
        .tab.active { background: linear-gradient(135deg, #2e7d32, #388e3c); color: white; }

        .upload-card { background: var(--glass); border: 1.5px dashed rgba(129,199,132,.3); border-radius: 24px; padding: 2rem; }
        .drop-zone { background: rgba(76,175,80,.06); border-radius: 16px; padding: 3rem 1rem; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .drop-zone:hover { border-color: var(--light-green); background: rgba(76,175,80,.12); }

        .loader-overlay { display: none; margin-top: 2rem; }
        .loader-steps { display: flex; justify-content: space-between; margin-bottom: 20px; position: relative; }
        .lstep { display: flex; flex-direction: column; align-items: center; z-index: 1; flex: 1; }
        .lstep-dot { width: 35px; height: 35px; border-radius: 50%; background: #1a2e23; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .lstep-dot.active { border-color: var(--light-green); box-shadow: 0 0 15px var(--light-green); }
        .lstep-dot.done { background: var(--primary-green); border-color: var(--light-green); }
        .bar-bg { height: 6px; background: rgba(255,255,255,.1); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--light-green); transition: width 0.5s; }

        .section-card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-top: 1.5rem; }
        .result-card { display: none; margin-top: 2rem; animation: fadeU 0.6s ease; }
        .res-hdr { display: flex; align-items: center; gap: 15px; padding: 1.5rem; background: rgba(46,125,50,0.2); border-radius: 20px 20px 0 0; }
        .conf-badge { margin-left: auto; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; background: rgba(105,240,174,0.1); border: 1px solid var(--light-green); color: var(--light-green); }

        .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, #2e7d32, #43a047); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; margin-top: 1.5rem; }
        .hidden { display: none; }
        @keyframes fadeU { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="app">
        <div class="bg-particles">
            <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div>
        </div>
        <div class="wrap">
            <div class="header">
                <div class="logo-box">🌿</div>
                <h1 class="title">Plant AI Detector</h1>
                <p style="color: #81c784; margin-top: 5px;">Botany Expert & Live Weather Suite</p>
            </div>
            <div class="stat-strip">
                <div class="stat-box"><span class="stat-num">50K+</span><span class="stat-lbl">Species</span></div>
                <div class="stat-box"><span class="stat-num">98.2%</span><span class="stat-lbl">Accuracy</span></div>
                <div class="stat-box"><span class="stat-num" id="scanCount">0</span><span class="stat-lbl">Scans</span></div>
                <div class="stat-box"><span class="stat-num">2s</span><span class="stat-lbl">Speed</span></div>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="setTab('upload')">📷 Upload</button>
                <button class="tab" onclick="setTab('camera')">🎥 Camera</button>
                <button class="tab" onclick="setTab('url')">🔗 URL</button>
            </div>
            <div class="upload-card">
                <div id="modeUpload">
                    <div class="drop-zone" onclick="document.getElementById('fi').click()" id="dz">
                        <div style="font-size: 3rem;">🌱</div>
                        <p>Drop plant photo or click to browse</p>
                    </div>
                    <input type="file" id="fi" class="hidden" accept="image/*" onchange="previewFile(this)">
                </div>
                <button class="btn-primary" id="analyzeBtn" onclick="runAnalysis()">🔍 Analyze Plant</button>
            </div>
        </div>
    </div>
</body>
</html>
