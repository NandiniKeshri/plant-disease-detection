<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato AI Detector | Engineering Project</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');
        
        :root {
            --primary-green: #2d7a3a;
            --light-green: #69f0ae;
            --deep-forest: #071510;
            --accent-green: #81c784;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(129, 199, 132, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--deep-forest);
            color: #e8f5e0;
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .wrap { max-width: 820px; margin: 0 auto; padding: 2rem 1rem; position: relative; z-index: 1; }

        /* Header & Stats */
        .header { text-align: center; margin-bottom: 2rem; }
        .logo-box { width: 60px; height: 60px; background: linear-gradient(135deg, #3a9e4a, #5ccc6c); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 15px; }
        .title { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #a5d6a7, #e8f5e9, #69f0ae); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Stat Strip */
        .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
        .stat-box { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-num { font-size: 1.2rem; font-weight: 600; color: var(--light-green); display: block; }
        .stat-lbl { font-size: 0.65rem; color: #66bb6a; text-transform: uppercase; }

        /* Upload Card */
        .upload-card { background: var(--glass); border: 1.5px dashed var(--border); border-radius: 24px; padding: 2rem; transition: 0.3s; }
        .drop-zone { background: rgba(76,175,80,.06); border-radius: 16px; padding: 3rem 1rem; text-align: center; cursor: pointer; }
        .drop-zone img { max-width: 100%; max-height: 250px; border-radius: 12px; margin-bottom: 1rem; }
        
        /* Loading Stepper */
        .loader-overlay { display: none; margin-top: 2rem; }
        .loader-steps { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .lstep-dot { width: 35px; height: 35px; border-radius: 50%; background: #1a2e23; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .lstep-dot.active { border-color: var(--light-green); box-shadow: 0 0 15px var(--light-green); }
        .lstep-dot.done { background: var(--primary-green); border-color: var(--light-green); }
        .bar-bg { height: 6px; background: rgba(255,255,255,.1); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--light-green); transition: width 0.5s; }

        /* Results Card */
        .result-card { display: none; margin-top: 2rem; background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        .res-hdr { display: flex; align-items: center; gap: 15px; padding: 1.5rem; background: rgba(46,125,50,0.2); }
        
        /* Utility */
        .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, #2e7d32, #43a047); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; margin-top: 1.5rem; font-size: 1rem; }
        .btn-primary:disabled { opacity: 0.5; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="header">
        <div class="logo-box">🌿</div>
        <h1 class="title">Potato AI Detector</h1>
        <p style="color: #81c784; margin-top: 5px;">Deep Learning Plant Disease Analysis</p>
    </div>

    <div class="stat-strip">
        <div class="stat-box"><span class="stat-num">Potatoes</span><span class="stat-lbl">Focus</span></div>
        <div class="stat-box"><span class="stat-num">CNN</span><span class="stat-lbl">Model</span></div>
        <div class="stat-box"><span class="stat-num" id="scanCount">0</span><span class="stat-lbl">Your Scans</span></div>
        <div class="stat-box"><span class="stat-num">TFLite</span><span class="stat-lbl">Engine</span></div>
    </div>

    <div class="upload-card">
        <div id="dz" class="drop-zone" onclick="document.getElementById('fi').click()">
            <div style="font-size: 3rem;">🌱</div>
            <p>Click to upload potato leaf photo</p>
        </div>
        <input type="file" id="fi" class="hidden" accept="image/*" onchange="previewFile(this)">

        <div class="loader-overlay" id="loaderBox">
            <div class="loader-steps">
                <div class="lstep-dot" id="ls0">📸</div>
                <div class="lstep-dot" id="ls1">🔍</div>
                <div class="lstep-dot" id="ls2">🥔</div>
                <div class="lstep-dot" id="ls3">💊</div>
                <div class="lstep-dot" id="ls4">✅</div>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
            <p id="loaderLbl" style="text-align:center; font-size: 0.8rem; margin-top: 10px; color: var(--light-green);">Ready...</p>
        </div>

        <button class="btn-primary" id="analyzeBtn" onclick="runAnalysis()">🔍 Analyze Plant</button>
    </div>

    <div class="result-card" id="resultCard">
        <div class="res-hdr">
            <span id="rEmoji" style="font-size: 2.5rem;">🥔</span>
            <div>
                <h2 id="rName" style="font-family: 'Playfair Display';">Analysis Results</h2>
                <p id="rSci" style="font-style: italic; color: var(--accent-green);">Solanum tuberosum</p>
            </div>
        </div>
        <div style="padding: 1.5rem;">
            <p id="rDesc" style="font-size: 0.9rem; line-height: 1.6;"></p>
            <button class="btn-primary" onclick="window.location.reload()">🔄 New Scan</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
    let base64Img = null;
    let scanCount = 0;

    function previewFile(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            base64Img = e.target.result.split(',')[1];
            document.getElementById('dz').innerHTML = `<img src="${e.target.result}">`;
        };
        reader.readAsDataURL(file);
    }

    async function runLoader() {
        const steps = ["Reading Image", "Extracting Pixels", "Running CNN Model", "Determining Health", "Done"];
        document.getElementById('loaderBox').style.display = 'block';
        for(let i=0; i<5; i++) {
            document.getElementById(`ls${i}`).classList.add('active');
            document.getElementById('loaderLbl').innerText = steps[i] + "...";
            document.getElementById('barFill').style.width = (i + 1) * 20 + "%";
            await new Promise(r => setTimeout(r, 600));
            document.getElementById(`ls${i}`).classList.remove('active');
            document.getElementById(`ls${i}`).classList.add('done');
        }
    }

    async function runAnalysis() {
        if(!base64Img) return alert("Please upload a leaf image first.");
        
        const btn = document.getElementById('analyzeBtn');
        btn.disabled = true;
        
        await runLoader();
        
        // Update UI
        document.getElementById('loaderBox').style.display = 'none';
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('rDesc').innerText = "Model indicates this potato leaf is Healthy. No signs of Early or Late Blight detected.";
        
        scanCount++;
        document.getElementById('scanCount').innerText = scanCount;
        btn.disabled = false;
    }
</script>
</body>
</html>
