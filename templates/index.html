<!DOCTYPE html>
<html>
<head>
    <title>Plant AI Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 900px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .upload-box {
            text-align: center;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #00c853;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #00e676;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .result-card {
            margin-top: 15px;
        }

        .bar {
            height: 12px;
            background: #444;
            border-radius: 6px;
            margin-top: 5px;
        }

        .fill {
            height: 12px;
            background: #00e676;
            border-radius: 6px;
        }

        .weather {
            text-align: center;
        }

        .weather p {
            margin: 5px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🌿 Smart Plant Disease Detector</h1>

    <!-- Upload Card -->
    <div class="card upload-box">
        <form id="form" action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" id="fileInput" name="file" accept="image/*" capture="camera">
            <br>
            <button type="submit">Analyze Leaf</button>
        </form>

        <div class="loader" id="loader">
            🔍 Analyzing image...
        </div>

        <img id="preview">
    </div>

    <!-- Result Card -->
    {% if result %}
    <div class="card result-card">
        <h3>🌿 Result</h3>
        <p><b>Disease:</b> {{ result }}</p>

        <p><b>Confidence:</b> {{ confidence }}%</p>
        <div class="bar">
            <div class="fill" style="width: {{ confidence }}%"></div>
        </div>

        <p><b>Description:</b> {{ description }}</p>
        <p><b>Remedy:</b> {{ remedy }}</p>
    </div>
    {% endif %}

    <!-- Weather Card (UI Feature) -->
    <div class="card weather">
        <h3>🌤 Weather Info</h3>
        <p>Temperature: 28°C</p>
        <p>Humidity: 65%</p>
        <p>Condition: Sunny</p>
    </div>

</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const form = document.getElementById('form');
    const loader = document.getElementById('loader');

    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    };

    form.onsubmit = () => {
        loader.style.display = "block";
    };
</script>

</body>
</html>
